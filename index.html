<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stringhinifest - 20 Años</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Roboto+Condensed:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Roboto Condensed', sans-serif;
            background-color: #E6DCCF; 
            background-image: url('https://www.transparenttextures.com/patterns/cardboard-flat.png'); 
            color: #333; 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1.main-title {
            font-family: 'Patrick Hand', cursive; 
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h2.year-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 5.5rem;
            margin: -10px 0 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .doodle-sparks {
            font-size: 1.5rem;
            margin: 0 15px;
        }

        #rsvp-form-container {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        h3.form-title {
            text-align: center;
            font-family: 'Patrick Hand', cursive;
            font-size: 2.2rem;
            margin-top: 0;
        }

        input, select, button {
            font-family: 'Roboto Condensed', sans-serif;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #999;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        button#btnEnviar {
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            transition: background-color 0.3s;
            margin-top: 15px;
        }

        button#btnEnviar:hover { background-color: #555; }
        button#btnEnviar:disabled { background-color: #aaa; cursor: not-allowed; }

        .map-section {
            width: 100%;
            text-align: center;
        }

        .map-title {
            font-family: 'Patrick Hand', cursive;
            font-size: 2rem;
            margin-bottom: 15px;
        }

        iframe.map-container {
            width: 100%;
            height: 350px;
            border: 5px solid rgba(255,255,255,0.7);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="main-title">Stringhinifest</h1>
        <h2 class="year-title">
            <span class="doodle-sparks">✧ ✧</span>
            20
            <span class="doodle-sparks">✧ ✧</span>
        </h2>
    </div>

    <div id="rsvp-form-container">
        <h3 class="form-title">Confirma tu asistencia</h3>
        <form id="rsvpForm">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="tel" id="telefono" placeholder="Número de teléfono" required>
            <input type="number" id="acompanantes" placeholder="¿Cuántos acompañantes?" min="0" required>
            
            <select id="asistencia" required>
                <option value="" disabled selected>¿Asistirás?</option>
                <option value="si">¡Claro que sí! 🥳</option>
                <option value="no">No podré ir 😔</option>
            </select>

            <button type="submit" id="btnEnviar">Enviar Confirmación</button>
        </form>
    </div>

    <div class="map-section">
        <h3 class="map-title">Ubicación del evento</h3>
        <iframe class="map-container" src="https://maps.app.goo.gl/HCwHLruu7rDx5YGHA" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Tus credenciales de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC4uJlXvpXcv6mRhTVNjQgNhVrNJst8_QE",
            authDomain: "stringhinifest.firebaseapp.com",
            projectId: "stringhinifest",
            storageBucket: "stringhinifest.firebasestorage.app",
            messagingSenderId: "899568331837",
            appId: "1:899568331837:web:6670794606929938578e54",
            measurementId: "G-H6XSZDTM19"
        };

        // Inicializar Firebase y Firestore
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Referencia al formulario
        const rsvpForm = document.getElementById('rsvpForm');
        const btnEnviar = document.getElementById('btnEnviar');

        rsvpForm.addEventListener('submit', async (e) => {
            // CRITICO: Esto evita que la página se reinicie
            e.preventDefault();
            
            console.log("Iniciando guardado en Firestore...");
            btnEnviar.disabled = true;
            btnEnviar.innerText = "Guardando...";

            try {
                // Intentamos guardar los datos en la colección "asistencias"
                const docRef = await addDoc(collection(db, "asistencias"), {
                    nombre: document.getElementById('nombre').value,
                    telefono: document.getElementById('telefono').value,
                    acompanantes: document.getElementById('acompanantes').value,
                    asistencia: document.getElementById('asistencia').value,
                    fecha_registro: new Date()
                });
                
                console.log("Documento escrito con ID: ", docRef.id);
                alert("¡Registro enviado! Nos vemos en el Stringhinifest.");
                rsvpForm.reset(); // Limpia los campos
                
            } catch (error) {
                console.error("Error al añadir el documento: ", error);
                alert("Error al enviar. Asegúrate de haber habilitado Firestore Database y las Reglas en la consola de Firebase.");
            } finally {
                btnEnviar.disabled = false;
                btnEnviar.innerText = "Enviar Confirmación";
            }
        });
    </script>
</body>
</html>
