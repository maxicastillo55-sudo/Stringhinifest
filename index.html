<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stringhinifest - 20 Años</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Roboto+Condensed:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto Condensed', sans-serif; background-color: #E6DCCF; background-image: url('https://www.transparenttextures.com/patterns/cardboard-flat.png'); color: #333; max-width: 600px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        h1.main-title { font-family: 'Patrick Hand', cursive; font-size: 3.5rem; margin: 0; text-transform: uppercase; }
        h2.year-title { font-family: 'Patrick Hand', cursive; font-size: 5.5rem; margin: -10px 0 0 0; }
        #rsvp-form-container { background-color: rgba(255, 255, 255, 0.7); padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #999; box-sizing: border-box; font-size: 1rem; }
        button#btnEnviar { background-color: #333; color: white; border: none; cursor: pointer; font-size: 1.3rem; }
        iframe { width: 100%; height: 300px; border-radius: 15px; margin-top: 20px; border: 5px solid white; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="main-title">Stringhinifest</h1>
        <h2 class="year-title">✧ 20 ✧</h2>
    </div>

    <div id="rsvp-form-container">
        <form id="rsvpForm">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="tel" id="telefono" placeholder="Número de teléfono" required>
            <input type="number" id="acompanantes" placeholder="¿Cuántos acompañantes?" min="0" required>
            <select id="asistencia" required>
                <option value="" disabled selected>¿Asistirás?</option>
                <option value="si">¡Sí!</option>
                <option value="no">No 😔</option>
            </select>
            <button type="submit" id="btnEnviar">Enviar Confirmación</button>
        </form>
    </div>

    <iframe 
        class="map-container"
        src="https://maps.google.com/maps?q=20.381306,-99.967278&z=17&output=embed" 
        width="100%" 
        height="350" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy">
    </iframe>
    <script type="module">
        // IMPORTANTE: Importamos desde 'firebase-database'
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4uJlXvpXcv6mRhTVNjQgNhVrNJst8_QE",
            authDomain: "stringhinifest.firebaseapp.com",
            databaseURL: "https://stringhinifest-default-rtdb.firebaseio.com", // Verifica esta URL en tu consola
            projectId: "stringhinifest",
            storageBucket: "stringhinifest.firebasestorage.app",
            messagingSenderId: "899568331837",
            appId: "1:899568331837:web:6670794606929938578e54",
            measurementId: "G-H6XSZDTM19"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const form = document.getElementById('rsvpForm');
        const btn = document.getElementById('btnEnviar');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            
            btn.disabled = true;
            btn.innerText = "Guardando...";

            try {
                // Creamos una nueva referencia en la lista 'asistencias'
                const listaAsistenciasRef = ref(db, 'asistencias');
                const nuevaAsistenciaRef = push(listaAsistenciasRef);
                
                await set(nuevaAsistenciaRef, {
                    nombre: document.getElementById('nombre').value,
                    telefono: document.getElementById('telefono').value,
                    acompanantes: document.getElementById('acompanantes').value,
                    asistencia: document.getElementById('asistencia').value,
                    fecha: new Date().toISOString()
                });

                alert("¡Registrado con éxito!");
                form.reset();
            } catch (error) {
                console.error("ERROR:", error);
                alert("Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Enviar Confirmación";
            }
        });
    </script>
</body>
</html>
